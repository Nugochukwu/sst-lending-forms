<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Electrical Lab Item Request</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',sans-serif;background:#eef2ff;     min-height:100vh;display:flex;justify-content:center;     padding:24px 16px}.card{background:#fff;border-radius:16px;padding:28px;      width:100%;max-width:500px;box-shadow:0 4px 24px      rgba(33,55,110,.12);align-self:flex-start}header{text-align:center;margin-bottom:24px}header h1{color:#21376e;font-size:1.25rem;margin-bottom:4px}header p{color:#888;font-size:.85rem}.badge{display:inline-block;background:#eef2ff;color:#21376e;       border-radius:20px;padding:3px 12px;font-size:.8rem;       font-weight:600;margin-bottom:16px}label{display:block;font-size:.75rem;font-weight:700;      text-transform:uppercase;letter-spacing:.05em;      color:#555;margin-bottom:5px}select,input,textarea{width:100%;padding:11px 13px;  border:1.5px solid #dde3f5;border-radius:8px;  font-size:.95rem;margin-bottom:18px;outline:none;  transition:border .2s}select:focus,input:focus,textarea:focus{border-color:#6799ff}button{width:100%;padding:14px;border:none;border-radius:8px;  background:#21376e;color:#fff;font-size:1rem;font-weight:700;  cursor:pointer;transition:background .2s}button:hover{background:#3a5bbf}.req{color:#e24b4a}</style></head><body><div class='card'><header><h1>Pan-Atlantic University</h1><p>School of Science &amp; Technology</p></header><div style='text-align:center'><span class='badge'>Electrical Lab</span></div><form id='form'><input type='hidden' name='labId' value='1'><input type='hidden' name='labSlug' value='EL'><label>Full Name <span class='req'>*</span></label><input type='text' name='borrower' placeholder='e.g. John Okafor'       required><label>Student ID</label><input type='text' name='studentId' placeholder='e.g. PAU/2024/001'><label>Item Requested <span class='req'>*</span></label><select name='itemId' required><option value=''>-- Select an item --</option><option value='3'>H-500 (15 available)</option><option value='2'>IC-500 (45 available)</option><option value='1'>MARBLES (687 available)</option></select><label>Quantity <span class='req'>*</span></label><input type='number' name='quantity' min='1' value='1' required><label>Purpose <span class='req'>*</span></label><select name='reason' required><option value=''>-- Select --</option><option>Lab Practical</option><option>Student Project</option><option>Assignment</option><option>Personal Use</option><option>Other</option></select><label>Additional Notes</label><textarea name='notes' rows='3'  placeholder='Any extra details...'></textarea><label>Expected Return Date <span class='req'>*</span></label><input type='date' name='returnDate' required><button type='submit'>Submit Request</button></form><script>document.getElementById('form').addEventListener('submit',async e=>{  e.preventDefault();  const btn=e.target.querySelector('button');  btn.textContent='Submitting...';  btn.disabled=true;  try{    const res=await fetch('http://" + getLocalIp() + ":8765/lend',{      method:'POST',      headers:{'Content-Type':'application/x-www-form-urlencoded'},      body:new URLSearchParams(new FormData(e.target))    });    const txt=await res.text();    document.body.innerHTML=txt;  }catch(err){    btn.textContent='Submit Request';    btn.disabled=false;    alert('Could not reach the server. Make sure you are on the university WiFi.');  }});</script></div></body></html>
